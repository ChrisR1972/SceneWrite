name: Build Installers

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release with the built installers"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyInstaller pyarmor

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0

      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows'
        run: choco install nsis -y

      - name: Obfuscate source with PyArmor
        run: |
          mkdir -p _obf
          pyarmor gen -O _obf -r core ui
          pyarmor gen -O _obf main.py config.py debug_log.py fix_storyboard_extraction.py
          cp screenplay_tool.spec _obf/
          cp SceneWrite_Logo.* _obf/ 2>/dev/null || true
          mkdir -p _obf/config
          cp config/*.json _obf/config/ 2>/dev/null || true
        shell: bash

      - name: Build with PyInstaller
        run: |
          cd _obf
          pyinstaller --clean --noconfirm screenplay_tool.spec
        shell: bash

      - name: Stage build output
        run: |
          cp -r _obf/dist/* dist/ 2>/dev/null || mkdir -p dist && cp -r _obf/dist/* dist/
        shell: bash

      - name: Build installer with MPSC CLI
        run: node tools/cli.mjs build SceneWrite.mpsc --platform ${{ matrix.platform }} --output ./installers

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: scenewrite-${{ matrix.platform }}
          path: ./installers/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lhR ./release-assets

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(python -c "exec(open('config.py').read().split('class')[0]); print(APP_VERSION)")
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SceneWrite ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: ./release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
