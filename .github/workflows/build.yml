name: Build Installers

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release with the built installers"
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-26-intel
            platform: macos
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyInstaller

      - name: Pin PyQt6 for macOS 12 compatibility
        if: matrix.platform == 'macos'
        run: pip install 'PyQt6==6.5.3' 'PyQt6-Qt6==6.5.3' 'PyQt6-sip>=13.6,<14'

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0

      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows'
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Sync version into SceneWrite.mpsc
        run: |
          VERSION=$(python -c "import re; print(re.search(r'APP_VERSION\s*=\s*\"(.+?)\"', open('config.py').read()).group(1))")
          echo "Syncing version to $VERSION"
          python -c "
          import json, sys
          with open('SceneWrite.mpsc', 'r') as f: data = json.load(f)
          data['appVersion'] = '$VERSION'
          with open('SceneWrite.mpsc', 'w') as f: json.dump(data, f, indent=2)
          "
        shell: bash

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm screenplay_tool.spec
        shell: bash

      - name: List dist contents (debug)
        if: matrix.platform == 'macos'
        run: find dist/SceneWrite -maxdepth 2 -type f | head -60 && echo "---_internal---" && ls -la dist/SceneWrite/_internal/ | head -30
        shell: bash

      - name: Build installer with MPSC CLI
        run: node tools/cli.mjs build SceneWrite.mpsc --platform ${{ matrix.platform }} --output ./installers

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: scenewrite-${{ matrix.platform }}
          path: ./installers/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lhR ./release-assets

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(python -c "import re; print(re.search(r'APP_VERSION\s*=\s*\"(.+?)\"', open('config.py').read()).group(1))")
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SceneWrite ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: ./release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
