<!--
  SceneWrite Download + Purchase Section
  
  Drop this into your scenewrite.app landing page.
  
  SETUP:
  1. Replace GITHUB_USER/REPO with your GitHub repo (ChrisR1972/SceneWrite)
  2. Replace YOUR_PAYMENT_LINK_ID with your Stripe Payment Link URL
     (Create one at: Stripe Dashboard > Payment Links for product prod_U9ZW67xtbR6lXd)
  4. Update the version number when you release a new version

  The download button auto-detects the visitor's OS and shows the
  correct installer.  Links for all three platforms are always visible
  below for manual selection.
-->

<div id="sw-download" style="text-align:center; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; max-width:600px; margin:0 auto; padding:32px 20px;">

  <!-- ── Free Trial Download ──────────────────────────────────── -->

  <p style="font-size:13px; color:#666; margin:0 0 10px;">
    Try SceneWrite free for 7 days — no credit card required
  </p>

  <a id="sw-download-btn"
     href="#"
     style="display:inline-block; background:#2e7d32; color:#fff;
            padding:16px 44px; border-radius:8px; font-size:17px;
            font-weight:700; text-decoration:none; transition:background 0.2s;
            min-width:280px;"
     onmouseover="this.style.background='#388e3c'"
     onmouseout="this.style.background='#2e7d32'">
    Download Free Trial
  </a>

  <p id="sw-os-label" style="font-size:12px; color:#999; margin:8px 0 0;">
    Detecting your operating system...
  </p>

  <!-- All-platform links -->
  <div style="margin-top:16px; font-size:13px; color:#888;">
    Also available for:
    <a id="sw-alt-1" href="#" style="color:#0078d4; text-decoration:none; margin:0 6px;">Windows</a> ·
    <a id="sw-alt-2" href="#" style="color:#0078d4; text-decoration:none; margin:0 6px;">macOS</a> ·
    <a id="sw-alt-3" href="#" style="color:#0078d4; text-decoration:none; margin:0 6px;">Linux</a>
  </div>

  <!-- ── Divider ──────────────────────────────────────────────── -->

  <div style="margin:28px 0; border-top:1px solid #e0e0e0;"></div>

  <!-- ── Purchase ─────────────────────────────────────────────── -->

  <p style="font-size:13px; color:#666; margin:0 0 10px;">
    Already tried it? Get the full version:
  </p>

  <a href="https://buy.stripe.com/6oUaEQ3ZKfbAgHe6vC2wU01"
     style="display:inline-block; background:#0078d4; color:#fff;
            padding:14px 36px; border-radius:8px; font-size:16px;
            font-weight:600; text-decoration:none; transition:background 0.2s;"
     onmouseover="this.style.background='#1a8ae8'"
     onmouseout="this.style.background='#0078d4'">
    Buy SceneWrite — $49
  </a>

</div>

<script>
(function () {
  // ── Config ──────────────────────────────────────────────────
  // Update these when you release a new version.
  var repo    = "ChrisR1972/SceneWrite";
  var version = "1.0.0";

  var files = {
    windows: "scenewrite-" + version + "-setup.exe",
    macos:   "scenewrite-" + version + "-macos.dmg",
    linux:   "scenewrite-" + version + "-amd64.deb"
  };

  var labels = {
    windows: "Windows",
    macos:   "macOS",
    linux:   "Linux (Debian/Ubuntu)"
  };

  function downloadUrl(platform) {
    return "https://github.com/" + repo + "/releases/download/v" + version + "/" + files[platform];
  }

  // ── OS detection ────────────────────────────────────────────
  function detectOS() {
    var ua = navigator.userAgent || "";
    var plat = navigator.platform || "";
    if (/Mac/i.test(plat) || /Mac/i.test(ua))        return "macos";
    if (/Win/i.test(plat) || /Windows/i.test(ua))     return "windows";
    if (/Linux/i.test(plat) || /Linux/i.test(ua))     return "linux";
    return "windows"; // fallback
  }

  var detected = detectOS();
  var platforms = ["windows", "macos", "linux"];

  // ── Primary button ──────────────────────────────────────────
  var btn = document.getElementById("sw-download-btn");
  btn.href = downloadUrl(detected);
  btn.textContent = "Download Free Trial for " + labels[detected];

  var osLabel = document.getElementById("sw-os-label");
  osLabel.textContent = files[detected] + " · 7-day free trial";

  // ── Alternative platform links ──────────────────────────────
  var alts = platforms.filter(function (p) { return p !== detected; });

  var alt1 = document.getElementById("sw-alt-1");
  var alt2 = document.getElementById("sw-alt-2");
  var alt3 = document.getElementById("sw-alt-3");

  alt1.href = downloadUrl(alts[0]);
  alt1.textContent = labels[alts[0]];
  alt2.href = downloadUrl(alts[1]);
  alt2.textContent = labels[alts[1]];
  // Hide the third link since we only have 2 alternatives
  alt3.style.display = "none";
  // Remove the trailing " · " before the hidden link
  alt3.previousSibling.textContent = "";
})();
</script>
